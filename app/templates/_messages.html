<style>
    /* Success message */
    .alert-success {
       font-size: 1rem;
        text-align: center;
        align-items: center;
        justify-content: center;
        display: flex;
        height: 40px;
        color: green;  /* Text color */
    }
    
    /* Error message */
    .alert-error {
        font-size: 1rem;
        text-align: center;
        align-items: center;
        justify-content: center;
        display: flex;
        border-radius: 4px;
        height: 40px;
        color: red;  /* Text color */
        
    }

</style>
{% if messages %}
            {% for message in messages %}
          
                <div class="alert {% if message.tags == 'success' %}alert-success{% elif message.tags == 'error' %}alert-error{% endif %}">
                    {{ message }}
                </div> 
                
            {% endfor %}
        {% endif %}
