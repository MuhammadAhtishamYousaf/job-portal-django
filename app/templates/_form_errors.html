{% if form_data.errors %}

<div class="alert alert-danger">

    <strong>

        Please fix the following errors:

    </strong>

    <ul>

        {% for field in form_data %}

            {% for error in field.errors %}

                <li>

                    <strong>

                        {{ field.label }}

                    </strong>

                    :

                    {{ error }}

                </li>

            {% endfor %}

        {% endfor %}

        {% for error in form_data.non_field_errors %}

            <li>

                {{ error }}

            </li>

        {% endfor %}

    </ul>

</div>

{% endif %}
