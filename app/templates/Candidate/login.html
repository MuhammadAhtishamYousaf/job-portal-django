{% extends 'base.html' %}

{% load static %}

{% block 'title' %}  Candidate Login Form {% endblock  %}

{% block 'style' %}
  <style>
      *{
        margin:0px;
        padding:0;
        box-sizing: border-box;
        font-family: 'Nunito', sans-serif;
        scroll-behavior: smooth;
        
              
          }
          body {
            width: 100%;
            height:100%;
            overflow-x: hidden;
            /* background-color: aliceblue; */
            
          }
    
    .container {
        position: relative;
        max-width: 500px;
        border-radius: 16px;
        padding: 30px;
        margin:50px auto ;
        background-color: aliceblue;
        /* border:1px solid gray; */
        font-weight: lighter;
        box-shadow:1px 1px  3px 4px #ccc;
    }

    .form-group {
      margin-bottom: 20px;
    }

    form .form-group label {
      display: block;
      font-size: 1.1rem;
      font-weight: lighter;
    }

    form .form-group input {
      display: flex;
      width: 100%;
      min-width: 300px;
      padding: 10px ;
      border: none;
      outline: none;
      border-radius: 5px;
      font-size: 16px;
      background-color: transparent;
      box-shadow: 0 0 5px 3px rgba(0,0,0,0.1);
      transition: 0.3s;
    }
    .form-group input:hover {
      /* background-color: white; */
      border-bottom:1px solid dodgerblue;
    }

    .form-group input:focus {
      outline: none;
      border-color: dodgerblue;
    }

    form .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      min-width: 150px ;
      width:100%;
      background-color: steelblue;
      outline: none;
      border: none;
      font-size: 1.5rem;
      color: white;
      margin: 25px auto;
      border-radius: 5px;
      transition: all 0.3s linear;
      cursor: pointer;
      /* text-shadow: 1px 1px 10px white,
      10px 0 60px  pink ,10px 0 100px dodgerblue,
      0 0 100px rgb(255, 255, 255), 10px 0 100px darkblue; */
  }
    

    .btn:hover {
    background:transparent;
      border: 1px solid dodgerblue;
      color:black;
    }
  .login-logo {
      position:relative;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 2.5rem;
      color:steelblue
  }
  .forget-register {
      display: flex;
      justify-content: space-between;
      font-size: 1.1rem;
      font-weight: 500;
      margin:3px;
      width: 100%;
      padding: 1px

  }
  .forget-register a {
      text-decoration: none;

  }
  .forget-register a:hover {
      color:dodgerblue;
  }
    .field-error {
        margin-top: 6px;
        color: #b00020;
        font-size: 0.92rem;
    }


  @media screen and (max-width=400px) {
      .container {
          margin: 0.5rem;
      }
      
  }
    
  </style>
{% endblock  %}

{% block 'content' %}

    <div class="container">

    <h1 class="login-logo">Candidate Login</h1>
    {% include "_messages.html" %}
    
        <form action="{% url 'candidate_login' %}" method = "POST">

            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="checks">
                <input type="checkbox" checked>
                <label for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn">Login</button> <br>

            <div class="forget-register">
                <span> <a href="{% url 'password_reset' %}">Forget Password?</a></span>
                <span><a href="{% url 'candidate_registration' %}">New User? Register</a></span>
            </div>

        </form>
    </div>
{% endblock %}
