{% extends "base.html" %}
{% block 'title' %}Password Reset{% endblock %}
{% block 'style' %}
    <style>
        *{
            margin:0px;
            padding:0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            scroll-behavior: smooth;
            
                
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                width: 100%;
                height:100vh;
                overflow-x: hidden;
                /* background-color: aliceblue; */
                
            }
            h2,p {
                font-family:"DT Milagros";

            }
            button {
                display: inline-block;
                padding: 10px 20px;
                margin: 20px 0;
                background: #ffffff;
                color: #020202;
                text-decoration: none;
                border-radius: 5px;
            }
    </style>

{% endblock %}

{% block 'content' %}

    <h2>Password Reset Successful</h2>
    <p>Your password has been successfully reset. You can now with your new password.</p>

    <button> 
        <a class="btn" href="{% url 'candidate_login' %}">
            Login
        </a> 
    </button>

{% endblock  %}
