{% extends "base.html" %}
{% block 'title' %}Password Reset{% endblock %}
{% block 'style' %}
 <style>
     *{
        margin:0px;
        padding:0;
        box-sizing: border-box;
        font-family: 'Nunito', sans-serif;
        scroll-behavior: smooth;
        
              
          }
          body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 100%;
            height:100vh;

            overflow-x: hidden;
            /* background-color: aliceblue; */
            
          }
          h2,p {
            font-family:"DT Milagros";

          }
          button {
            display: inline-block;
            padding: 10px 20px;
            margin: 20px 0;
            background: #ffffff;
            color: #020202;
            text-decoration: none;
            border-radius: 5px;
        }


 </style>

{% endblock %}

{% block 'content' %}

    <h2>Confirm Password Reset</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}
        
        <button type="submit">Confirm Password Reset</button>

    </form>


{% endblock  %}
